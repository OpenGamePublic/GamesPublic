<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vista Gamer</title>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030712;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        #game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ─── Pantalla de bloqueo ─── */
        #block-screen {
            position: fixed;
            inset: 0;
            background: #030712;
            z-index: 99999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 32px;
        }

        #block-screen.visible { display: flex; }

        #block-screen svg {
            width: 64px;
            height: 64px;
            color: #1a3a4a;
            margin-bottom: 24px;
        }

        #block-screen h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a3a4a;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #block-screen p {
            font-size: 0.8rem;
            color: #0f2430;
            letter-spacing: 1px;
        }

        /* ─── Overlay de rotación ─── */
        #rotate-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.97);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }

        #rotate-overlay.visible { display: flex; }

        @keyframes rotar {
            0%   { transform: rotate(0deg); }
            40%  { transform: rotate(-90deg); }
            60%  { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        #rotate-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 28px;
            animation: rotar 2.4s ease-in-out infinite;
            color: #00d4ff;
        }

        #rotate-overlay p {
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            max-width: 280px;
            line-height: 1.5;
        }

        #rotate-overlay .sub {
            font-size: 0.85rem;
            font-weight: 400;
            color: #4a8fa8;
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: none;
        }

        /* ─── Botón pantalla completa ─── */
        #fs-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(0, 10, 30, 0.88);
            border: 1.5px solid #00d4ff;
            color: #00d4ff;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 8px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #fs-btn:active {
            background: rgba(0, 212, 255, 0.18);
            transform: scale(0.97);
        }

        #fs-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <iframe id="game-iframe" src="about:blank" allowfullscreen allow="fullscreen"></iframe>

    <div id="block-screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h1>Acceso restringido</h1>
        <p>Este contenido solo está disponible<br>desde la aplicación oficial.</p>
    </div>

    <div id="rotate-overlay" role="alert" aria-live="assertive">
        <svg id="rotate-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
            <rect x="7" y="1" width="10" height="16" rx="2"/>
            <circle cx="12" cy="15" r="0.6" fill="currentColor" stroke="none"/>
            <path d="M3 9 A9 9 0 0 1 21 9"/>
            <polyline points="21,6 21,9 18,9"/>
        </svg>
        <p>Rota tu teléfono</p>
        <p class="sub">Gira a modo horizontal para jugar</p>
    </div>

    <button id="fs-btn" aria-label="Pantalla completa">
        <svg id="fs-icon" viewBox="0 0 24 24">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
            <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
            <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
            <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
        <span id="fs-label">Expandir</span>
    </button>

    <script>
    (function () {

        /* ── Referencias DOM ─────────────────────── */
        var blockScreen = document.getElementById('block-screen');
        var iframe      = document.getElementById('game-iframe');
        var fsBtn       = document.getElementById('fs-btn');

        /* ════════════════════════════════════════════
           CAPA 1: User Agent (WebView interno de app)
           Valor exacto en AppCreator24: Android/WebPublicGames
        ════════════════════════════════════════════ */
        var REQUIRED_UA = 'Android/WebPublicGames';
        var ua          = navigator.userAgent || '';
        var uaOk        = (ua.indexOf(REQUIRED_UA) !== -1);

        /* ════════════════════════════════════════════
           CAPA 2: Token en URL (Chrome externo)
           La app abre Chrome con ?k=Une3f5iUTan18mmlzW0jOC0w
           El token se borra de la barra inmediatamente.
        ════════════════════════════════════════════ */
        var REQUIRED_TOKEN = 'Une3f5iUTan18mmlzW0jOC0w';
        var tokenOk        = false;

        try {
            var params = new URLSearchParams(window.location.search);
            var tk     = params.get('k') || '';
            tokenOk    = (tk === REQUIRED_TOKEN);
        } catch (e) {
            var raw = window.location.search;
            tokenOk = (raw.indexOf('k=' + REQUIRED_TOKEN) !== -1);
        }

        if (tokenOk && window.history && window.history.replaceState) {
            try {
                window.history.replaceState(null, '', window.location.pathname);
            } catch (e) { /* silencioso */ }
        }

        /* ── Decisión de acceso ──────────────────── */
        if (!uaOk && !tokenOk) {
            blockScreen.classList.add('visible');
            fsBtn.style.display = 'none';
            return; /* detiene todo */
        }

        /* ════════════════════════════════════════════
           Carga directa del juego en texto plano
        ════════════════════════════════════════════ */
        iframe.src = 'https://db.pastexams.org/html/fnaf2/index.html';


        /* ── Detección orientación Android ──────── */
        var isAndroid     = /Android/i.test(ua);
        var rotateOverlay = document.getElementById('rotate-overlay');

        function isPortrait() {
            if (window.screen && window.screen.width > 0 && window.screen.height > 0) {
                return window.screen.height > window.screen.width;
            }
            return window.innerHeight > window.innerWidth;
        }

        function updateOverlay() {
            if (!isAndroid) return;
            if (isPortrait()) {
                rotateOverlay.classList.add('visible');
            } else {
                rotateOverlay.classList.remove('visible');
            }
        }

        updateOverlay();
        window.addEventListener('orientationchange', function () { setTimeout(updateOverlay, 100); });
        window.addEventListener('resize',            function () { setTimeout(updateOverlay, 50);  });


        /* ── Pantalla completa ───────────────────── */
        var fsIcon  = document.getElementById('fs-icon');
        var fsLabel = document.getElementById('fs-label');

        var ICON_EXPAND =
            '<path d="M8 3H5a2 2 0 0 0-2 2v3"/>' +
            '<path d="M21 8V5a2 2 0 0 0-2-2h-3"/>' +
            '<path d="M3 16v3a2 2 0 0 0 2 2h3"/>' +
            '<path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';

        var ICON_COMPRESS =
            '<path d="M8 3v5H3"/>' +
            '<path d="M21 8h-5V3"/>' +
            '<path d="M3 16h5v5"/>' +
            '<path d="M16 21v-5h5"/>';

        function enterFullscreen() {
            var el = document.documentElement;
            if      (el.requestFullscreen)       el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
            else if (el.msRequestFullscreen)     el.msRequestFullscreen();
        }

        function exitFullscreen() {
            if      (document.exitFullscreen)       document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
            else if (document.msExitFullscreen)     document.msExitFullscreen();
        }

        function isFullscreen() {
            return !!(
                document.fullscreenElement       ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement    ||
                document.msFullscreenElement
            );
        }

        fsBtn.addEventListener('click', function () {
            if (isFullscreen()) exitFullscreen();
            else enterFullscreen();
        });

        function onFSChange() {
            if (isFullscreen()) {
                fsIcon.innerHTML = ICON_COMPRESS;
                fsLabel.textContent = 'Reducir';
            } else {
                fsIcon.innerHTML = ICON_EXPAND;
                fsLabel.textContent = 'Expandir';
            }
        }

        document.addEventListener('fullscreenchange',       onFSChange);
        document.addEventListener('webkitfullscreenchange', onFSChange);
        document.addEventListener('mozfullscreenchange',    onFSChange);
        document.addEventListener('MSFullscreenChange',     onFSChange);

        /* ── Bloqueo de atajos y clic derecho para curiosos ── */
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
               (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
            }
        });

    })();
    </script>
</body>
</html>
